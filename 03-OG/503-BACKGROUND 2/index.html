<!-- 
- Ao usar uma imagem na tag <img>, estou aplicando ela como conteúdo.
- Ao usar uma imagem no elemento background direto em uma <div> em CSS, estou aplicando a imagem como estilo. 
 O conteúdo é algo essencial do seu site (ex: a foto de um produto que você está vendendo.)
 O estilo é algo que é apenas visual (ex: plano de fundo do site ou da div em si).
